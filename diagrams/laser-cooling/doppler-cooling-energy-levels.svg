<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" role="img">
  <title>Atomic energy levels: absorption and spontaneous emission</title>
  <desc>A two-level atom. On the left, an incoming photon of energy h-nu is absorbed and the electron jumps from the ground state to the excited state. On the right, the electron falls back and a photon is spontaneously emitted.</desc>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 15px; font-weight: 600; fill: #2C2C2A; }
    @media (prefers-color-scheme: dark){ .t,.th{fill:#E8E6DE;} .ts{fill:#B4B2A9;} }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <line x1="150" y1="288" x2="400" y2="288" stroke="#5F5E5A" stroke-width="2"/>
  <line x1="150" y1="112" x2="400" y2="112" stroke="#5F5E5A" stroke-width="2"/>
  <text class="ts" x="408" y="116">E₂ · excited</text>
  <text class="ts" x="408" y="292">E₁ · ground</text>

  <line x1="140" y1="118" x2="140" y2="282" stroke="#888780" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="132" y="204" text-anchor="end">ΔE = hν</text>

  <path transform="translate(180,138)" d="M0.0 0.0 L2.4 3.0 L3.8 6.0 L3.8 9.0 L2.4 12.0 L0.0 15.0 L-2.4 18.0 L-3.8 21.0 L-3.8 24.0 L-2.4 27.0 L-0.0 30.0 L2.4 33.0 L3.8 36.0 L3.8 39.0 L2.4 42.0 L0.0 45.0 L-2.4 48.0 L-3.8 51.0 L-3.8 54.0 L-2.4 57.0 L-0.0 60.0 L2.4 63.0 L3.8 66.0 L3.8 69.0 L2.4 72.0 L0.0 75.0 L-2.4 78.0 L-3.8 81.0 L-3.8 84.0 L-2.4 87.0 L-0.0 90.0 L2.4 93.0 L3.8 96.0 L3.8 99.0 L2.4 102.0 L0.0 105.0 L-2.4 108.0 L-3.8 111.0 L-3.8 114.0 L-2.4 117.0 L-0.0 120.0 L2.4 123.0 L3.8 126.0 L3.8 129.0 L2.4 132.0 L-0.0 135.0 L-2.4 138.0 L-3.8 141.0 L-3.8 144.0 L-2.4 147.0 L-0.0 150.0" fill="none" stroke="#EF9F27" stroke-width="2" marker-start="url(#arrow)"/>
  <line x1="212" y1="284" x2="212" y2="118" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
  <circle cx="212" cy="288" r="4.5" fill="#185FA5"/>
  <text class="t" x="196" y="316" text-anchor="middle">absorption</text>

  <line x1="330" y1="116" x2="330" y2="284" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
  <circle cx="330" cy="112" r="4.5" fill="#185FA5"/>
  <path transform="translate(354,138)" d="M0.0 0.0 L2.4 3.0 L3.8 6.0 L3.8 9.0 L2.4 12.0 L0.0 15.0 L-2.4 18.0 L-3.8 21.0 L-3.8 24.0 L-2.4 27.0 L-0.0 30.0 L2.4 33.0 L3.8 36.0 L3.8 39.0 L2.4 42.0 L0.0 45.0 L-2.4 48.0 L-3.8 51.0 L-3.8 54.0 L-2.4 57.0 L-0.0 60.0 L2.4 63.0 L3.8 66.0 L3.8 69.0 L2.4 72.0 L0.0 75.0 L-2.4 78.0 L-3.8 81.0 L-3.8 84.0 L-2.4 87.0 L-0.0 90.0 L2.4 93.0 L3.8 96.0 L3.8 99.0 L2.4 102.0 L0.0 105.0 L-2.4 108.0 L-3.8 111.0 L-3.8 114.0 L-2.4 117.0 L-0.0 120.0 L2.4 123.0 L3.8 126.0 L3.8 129.0 L2.4 132.0 L-0.0 135.0 L-2.4 138.0 L-3.8 141.0 L-3.8 144.0 L-2.4 147.0 L-0.0 150.0" fill="none" stroke="#EF9F27" stroke-width="2" marker-start="url(#arrow)"/>
  <text class="t" x="342" y="316" text-anchor="middle">spontaneous emission</text>
</svg>
