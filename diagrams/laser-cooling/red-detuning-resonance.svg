<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img">
  <title>Red detuning: laser tuned below the atomic resonance</title>
  <desc>A frequency axis showing the atomic resonance peak. The laser sits just below resonance (red-detuned). An atom moving toward the beam is Doppler-shifted up onto resonance and absorbs; an atom moving away is shifted further off resonance and does not.</desc>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 15px; font-weight: 600; fill: #2C2C2A; }
    @media (prefers-color-scheme: dark){ .t,.th{fill:#E8E6DE;} .ts{fill:#B4B2A9;} }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <path d="M80.0 229.9 L110.0 229.5 L140.0 228.9 L170.0 228.2 L200.0 227.2 L230.0 225.7 L260.0 223.4 L290.0 219.6 L314.0 214.6 L332.0 208.7 L350.0 199.6 L365.0 187.8 L377.0 174.1 L389.0 155.2 L401.0 130.4 L410.0 109.7 L419.0 91.6 L425.0 84.1 L431.0 82.1 L437.0 86.1 L446.0 101.0 L455.0 121.2 L464.0 141.4 L473.0 158.8 L482.0 172.8 L491.0 183.8 L500.0 192.3 L512.0 200.8 L524.0 207.0 L539.0 212.6 L554.0 216.6 L575.0 220.4 L602.0 223.6 L608.0 224.1" fill="none" stroke="#185FA5" stroke-width="2"/>

  <line x1="60" y1="232" x2="628" y2="232" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="626" y="252" text-anchor="end">laser frequency</text>

  <line x1="430" y1="82" x2="430" y2="232" stroke="#888780" stroke-width="0.75" stroke-dasharray="4 4"/>
  <text class="t" x="430" y="66" text-anchor="middle">atomic resonance ω₀</text>

  <line x1="345" y1="150" x2="345" y2="232" stroke="#D64545" stroke-width="2"/>
  <circle cx="345" cy="150" r="4" fill="#D64545"/>
  <text class="ts" x="345" y="272" text-anchor="middle">laser ω_L (red-detuned)</text>

  <line x1="345" y1="248" x2="430" y2="248" stroke="#888780" stroke-width="0.75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="388" y="263" text-anchor="middle">detuning δ</text>

  <line x1="352" y1="140" x2="424" y2="112" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text class="ts" x="470" y="118" text-anchor="start">toward → blueshift (absorbed)</text>
  <line x1="338" y1="170" x2="286" y2="188" stroke="#D64545" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text class="ts" x="150" y="196" text-anchor="middle">away → redshift (missed)</text>
</svg>
