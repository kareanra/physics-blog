  <text class="th" x="180" y="26" text-anchor="middle">Constructive interference</text>
  <text class="ts" x="180" y="44" text-anchor="middle">two waves in phase</text>
  <text class="th" x="500" y="26" text-anchor="middle">Destructive interference</text>
  <text class="ts" x="500" y="44" text-anchor="middle">two waves out of phase (180°)</text>

