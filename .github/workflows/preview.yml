name: Build preview

# Renders the site on pull requests and uploads it as a downloadable artifact,
# so you can check changes before they merge to main. Does not deploy.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render site
        run: quarto render

      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: _site
          retention-days: 7
